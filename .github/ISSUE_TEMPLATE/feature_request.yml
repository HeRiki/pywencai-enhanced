name: Feature request
description: Suggest an improvement for pywencai-enhanced
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the practical use case and expected API or behavior.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation or pain point are you hitting today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the project to do?
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Mention whether this should preserve current `pywencai`-style usage.
